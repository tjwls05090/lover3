<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>여기를 눌러보세요 🎁</title>

<!-- 폭죽 라이브러리 -->
<script src="https://cdn.jsdelivr.net/npm/canvas-confetti@1.9.3/dist/confetti.browser.min.js"></script>

<style>

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, sans-serif;
}

body{
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    overflow:hidden;
    background:linear-gradient(135deg,#ffdde1,#ee9ca7,#c2e9fb);
}

.container{
    text-align:center;
}

/* 선물상자 */
.gift{
    font-size:100px;
    cursor:pointer;
    transition:.3s;
    animation:bounce 1.5s infinite;
}

.gift:hover{
    transform:scale(1.15);
}

@keyframes bounce{
    50%{
        transform:translateY(-12px);
    }
}

/* 카드 */

.card{
    margin-top:25px;
    width:360px;
    background:white;
    border-radius:25px;
    padding:35px;
    box-shadow:0 20px 40px rgba(0,0,0,.2);

    opacity:0;
    transform:scale(.5) rotate(-10deg);
    transition:1s;
}

.card.show{
    opacity:1;
    transform:scale(1) rotate(0);
}

h1{
    color:#ff4d88;
    margin-bottom:20px;
}

.message{
    line-height:1.8;
    color:#555;
    font-size:20px;
}

.heart{
    font-size:40px;
    margin-top:20px;
    animation:heart .8s infinite;
}

@keyframes heart{
    50%{
        transform:scale(1.3);
    }
}

/* 반짝이 */

.star{
    position:absolute;
    font-size:24px;
    animation:twinkle 2s infinite;
}

@keyframes twinkle{
    50%{
        opacity:.2;
        transform:scale(.5);
    }
}

</style>
</head>

<body>

<div class="star" style="top:8%;left:15%;">✨</div>
<div class="star" style="top:18%;left:80%;">⭐</div>
<div class="star" style="top:75%;left:12%;">✨</div>
<div class="star" style="top:82%;left:70%;">⭐</div>
<div class="star" style="top:45%;left:92%;">✨</div>

<div class="container">

<div class="gift" id="gift" onclick="openGift()">
🎁
</div>

<p style="margin-top:15px;font-size:22px;color:white;">
선물을 눌러보세요!
</p>

<div class="card" id="card">

<h1>🎉 축하합니다! 🎉</h1>

<div class="message">

윤정열님 😊

<br><br>

당신은 바봉입니당

<br><br>

어이가 없다면 뽀뽀를 하세요

<br><br>

💖 좋은 하루 보내세요 💖

</div>

<div class="heart">
❤️
</div>

</div>

</div>

<script>

function openGift(){

document.getElementById("gift").style.display="none";

document.getElementById("card").classList.add("show");

// 폭죽
confetti({
    particleCount:180,
    spread:120,
    origin:{y:0.6}
});

// 왼쪽
confetti({
    particleCount:100,
    angle:60,
    spread:80,
    origin:{x:0}
});

// 오른쪽
confetti({
    particleCount:100,
    angle:120,
    spread:80,
    origin:{x:1}
});

}

</script>

</body>
</html>
